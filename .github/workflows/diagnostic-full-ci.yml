name: Diagnostic Full CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_TEST_MAX_CONCURRENCY: 1
  BUN_TEST_TIMEOUT_MS: 180000
  BUN_TEST_ISOLATE_FILES: 1

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Configure git identity
        run: |
          git config user.name "repo-harness-ci"
          git config user.email "repo-harness-ci@users.noreply.github.com"
      - name: Install shell dependencies
        run: sudo apt-get update && sudo apt-get install -y rsync
      - uses: oven-sh/setup-bun@v2
      - name: Run full CI with captured output
        shell: bash
        run: |
          set +e
          bash scripts/check-ci.sh > full-ci.log 2>&1
          STATUS=$?
          echo "FULL_CI_STATUS=$STATUS" >> full-ci.log
          exit "$STATUS"
      - name: Upload full CI log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-diagnostic
          path: full-ci.log
          if-no-files-found: error
