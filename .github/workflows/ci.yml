name: Package v8.1 Full Source

on:
  push:
    branches:
      - codex/package-v8.1-full-ready

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Restore final standard CI file in archive
        run: git show HEAD^:.github/workflows/ci.yml > .github/workflows/ci.yml

      - name: Build full source archive
        run: zip -r /tmp/repo-harness-v8.1-full-ready.zip . -x '.git/*'

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: repo-harness-v8.1-full-ready
          path: /tmp/repo-harness-v8.1-full-ready.zip
          if-no-files-found: error
          retention-days: 30
