name: Apply MCP Stream Cleanup Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Apply stream lifecycle patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/cli/mcp/transports/http.ts')
          text = path.read_text()
          old = '''async function handleMcpGet(req: Request, res: Response, transports: Map<string, ManagedTransport>): Promise<void> {
            const sessionId = req.headers['mcp-session-id'] as string | undefined;
            const managed = sessionId ? transports.get(sessionId) : undefined;
            if (!managed) {
              res.status(400).json({ error: 'No valid session' });
              return;
            }
            managed.lastSeenAt = Date.now();
            managed.inFlightGets += 1;
            try {
              await managed.transport.handleRequest(req, res);
            } finally {
              managed.inFlightGets -= 1;
              managed.lastSeenAt = Date.now();
            }
          }
          '''
          new = '''async function handleMcpGet(req: Request, res: Response, transports: Map<string, ManagedTransport>): Promise<void> {
            const sessionId = req.headers['mcp-session-id'] as string | undefined;
            const managed = sessionId ? transports.get(sessionId) : undefined;
            if (!managed) {
              res.status(400).json({ error: 'No valid session' });
              return;
            }
            managed.lastSeenAt = Date.now();
            managed.inFlightGets += 1;
            let released = false;
            const releaseStream = (): void => {
              if (released) return;
              released = true;
              managed.inFlightGets = Math.max(0, managed.inFlightGets - 1);
              managed.lastSeenAt = Date.now();
            };
            req.once('aborted', releaseStream);
            res.once('close', releaseStream);
            try {
              await managed.transport.handleRequest(req, res);
            } finally {
              req.off('aborted', releaseStream);
              res.off('close', releaseStream);
              releaseStream();
            }
          }
          '''
          if old not in text:
            raise SystemExit('handleMcpGet anchor not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Focused verification
        run: |
          bun test tests/cli/mcp-http.test.ts
          bun run check:type

      - name: Commit verified source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/cli/mcp/transports/http.ts
          git diff --cached --check
          git commit -m "fix: release cancelled MCP HTTP streams"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
