<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">repo-harness banner</title>
  <desc id="desc">A wide banner for repo-harness showing ChatGPT, controller, repo, and agent workflow cards.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="64" x2="1180" y2="604" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081120"/>
      <stop offset="0.52" stop-color="#102546"/>
      <stop offset="1" stop-color="#0C1830"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1070 128) rotate(127.67) scale(430 532)">
      <stop stop-color="#3DD9C5" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#3DD9C5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(262 546) rotate(-22.54) scale(360 240)">
      <stop stop-color="#FFB347" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="763" y1="108" x2="1140" y2="498" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F2A4D"/>
      <stop offset="1" stop-color="#0C1E36"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1360" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#040B16" flood-opacity="0.38"/>
    </filter>
    <filter id="soft" x="-20" y="-20" width="1320" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#9DB6DB" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#9AC7FF"/>
    </marker>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="32" fill="url(#grid)"/>
  <circle cx="1070" cy="128" r="250" fill="url(#glowA)"/>
  <circle cx="262" cy="546" r="220" fill="url(#glowB)"/>
  <path d="M0 548C170 496 308 479 468 485C616 491 702 549 838 560C965 570 1114 540 1280 476V640H0V548Z" fill="#07101C" fill-opacity="0.28"/>

  <g filter="url(#shadow)">
    <rect x="724" y="92" width="476" height="456" rx="28" fill="url(#panel)" stroke="#D7E4FF" stroke-opacity="0.22"/>
  </g>

  <rect x="78" y="82" width="214" height="40" rx="20" fill="#0D2746" stroke="#7ADFD4" stroke-opacity="0.42"/>
  <circle cx="104" cy="102" r="5" fill="#7ADFD4"/>
  <circle cx="122" cy="102" r="5" fill="#FFB347"/>
  <circle cx="140" cy="102" r="5" fill="#91B8FF"/>
  <text x="162" y="108" fill="#DDEBFF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">Repository execution bridge</text>

  <text x="80" y="214" fill="#F6FAFF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="82" font-weight="800" letter-spacing="-2">repo-harness</text>
  <text x="80" y="276" fill="#7ADFD4" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700">ChatGPT-controlled, repo-native engineering workflow</text>
  <text x="80" y="334" fill="#D7E4FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500">Plans, contracts, direct edits, and review evidence live in the repo.</text>
  <text x="80" y="370" fill="#D7E4FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500">The next session resumes from files instead of chat memory.</text>

  <g>
    <rect x="80" y="426" width="190" height="48" rx="24" fill="url(#chip)" stroke="#6FD8C7" stroke-opacity="0.38"/>
    <text x="175" y="456" text-anchor="middle" fill="#F4F8FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">Direct Edit default</text>

    <rect x="286" y="426" width="192" height="48" rx="24" fill="url(#chip)" stroke="#8FB7FF" stroke-opacity="0.38"/>
    <text x="382" y="456" text-anchor="middle" fill="#F4F8FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">Issue → Task → Run</text>

    <rect x="80" y="488" width="196" height="48" rx="24" fill="url(#chip)" stroke="#FFBD6B" stroke-opacity="0.38"/>
    <text x="178" y="518" text-anchor="middle" fill="#F4F8FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">File-backed handoff</text>

    <rect x="292" y="488" width="252" height="48" rx="24" fill="url(#chip)" stroke="#F6E09B" stroke-opacity="0.38"/>
    <text x="418" y="518" text-anchor="middle" fill="#F4F8FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">MIT-ready release surface</text>
  </g>

  <g>
    <line x1="838" y1="268" x2="914" y2="268" stroke="#9AC7FF" stroke-opacity="0.78" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="988" y1="268" x2="1066" y2="268" stroke="#9AC7FF" stroke-opacity="0.78" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="914" y1="316" x2="914" y2="372" stroke="#7ADFD4" stroke-opacity="0.72" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="1066" y1="316" x2="990" y2="372" stroke="#FFB347" stroke-opacity="0.7" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="762" y="188" width="152" height="96" rx="20" fill="#0E2442" stroke="#92B9FF" stroke-opacity="0.32"/>
    <text x="786" y="224" fill="#F8FBFF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">ChatGPT</text>
    <text x="786" y="250" fill="#BFD6FA" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">reason, plan, review</text>

    <rect x="914" y="188" width="152" height="96" rx="20" fill="#0E2A30" stroke="#6FD8C7" stroke-opacity="0.34"/>
    <text x="938" y="224" fill="#F8FBFF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">Controller</text>
    <text x="938" y="250" fill="#BCEFE7" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">issues, tasks, direct edit</text>

    <rect x="1066" y="188" width="104" height="96" rx="20" fill="#2D2410" stroke="#FFC56E" stroke-opacity="0.34"/>
    <text x="1090" y="224" fill="#FFF8EC" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">Repo</text>
    <text x="1090" y="250" fill="#F7DDA3" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">files, policy</text>

    <rect x="838" y="372" width="152" height="96" rx="20" fill="#25183F" stroke="#CCB8FF" stroke-opacity="0.32"/>
    <text x="862" y="408" fill="#FBF8FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">Agents</text>
    <text x="862" y="434" fill="#DCD0FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Codex, Claude, Copilot</text>

    <rect x="1008" y="372" width="162" height="96" rx="20" fill="#17263A" stroke="#9AC7FF" stroke-opacity="0.26"/>
    <text x="1032" y="408" fill="#F8FBFF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">Verification</text>
    <text x="1032" y="434" fill="#C6D9F8" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">checks, review, evidence</text>
  </g>

  <g>
    <rect x="760" y="500" width="110" height="30" rx="15" fill="#0D2442" stroke="#8FB7FF" stroke-opacity="0.3"/>
    <text x="815" y="520" text-anchor="middle" fill="#DCE9FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">contracts</text>

    <rect x="882" y="500" width="88" height="30" rx="15" fill="#0D2B30" stroke="#6FD8C7" stroke-opacity="0.3"/>
    <text x="926" y="520" text-anchor="middle" fill="#DDF9F3" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">checks</text>

    <rect x="982" y="500" width="102" height="30" rx="15" fill="#2C220F" stroke="#FFBD6B" stroke-opacity="0.3"/>
    <text x="1033" y="520" text-anchor="middle" fill="#FFF1D2" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">handoffs</text>

    <rect x="1096" y="500" width="86" height="30" rx="15" fill="#24193D" stroke="#CCB8FF" stroke-opacity="0.3"/>
    <text x="1139" y="520" text-anchor="middle" fill="#F1EAFF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">runs</text>
  </g>

  <text x="80" y="592" fill="#97B7E3" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">GitHub-ready SVG banner for README and social cards</text>
</svg>
