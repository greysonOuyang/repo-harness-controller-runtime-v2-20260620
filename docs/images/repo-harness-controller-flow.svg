<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">repo-harness controller flow architecture diagram</title>
  <desc id="desc">Architecture diagram showing ChatGPT flowing into the repo-harness controller, repository source-of-truth files, and scoped agent execution with a review loop.</desc>
  <defs>
    <linearGradient id="bg" x1="104" y1="72" x2="1498" y2="888" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F8FE"/>
      <stop offset="0.48" stop-color="#EDF4FF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#11284B"/>
      <stop offset="1" stop-color="#183764"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10323A"/>
      <stop offset="1" stop-color="#1A4A55"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4B3211"/>
      <stop offset="1" stop-color="#6B4A1E"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#311C53"/>
      <stop offset="1" stop-color="#50317B"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1640" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#12223A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#406AA4"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#5E8DCB"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#C8D6EB" stroke-opacity="0.42" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="960" rx="32" fill="url(#bg)"/>
  <rect width="1600" height="960" rx="32" fill="url(#grid)"/>

  <text x="88" y="98" fill="#10284A" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5">ChatGPT → Controller → Repo → Agent</text>
  <text x="88" y="144" fill="#4A6587" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">The controller decides. The repository remembers. Agents execute inside scoped surfaces. Humans review the evidence.</text>

  <g filter="url(#shadow)">
    <rect x="88" y="196" width="312" height="452" rx="28" fill="white" stroke="#CAD8EC"/>
    <rect x="436" y="196" width="336" height="452" rx="28" fill="white" stroke="#CAD8EC"/>
    <rect x="808" y="196" width="336" height="452" rx="28" fill="white" stroke="#CAD8EC"/>
    <rect x="1180" y="196" width="332" height="452" rx="28" fill="white" stroke="#CAD8EC"/>
  </g>

  <rect x="108" y="216" width="272" height="88" rx="22" fill="url(#cardA)"/>
  <text x="136" y="264" fill="#F6FAFF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800">1. ChatGPT</text>
  <text x="136" y="290" fill="#C5D9F8" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">analysis, planning, review</text>

  <rect x="456" y="216" width="296" height="88" rx="22" fill="url(#cardB)"/>
  <text x="484" y="264" fill="#F6FFFE" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800">2. Controller</text>
  <text x="484" y="290" fill="#C6F2ED" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">issue/task/run orchestration</text>

  <rect x="828" y="216" width="296" height="88" rx="22" fill="url(#cardC)"/>
  <text x="856" y="264" fill="#FFF8ED" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800">3. Repository</text>
  <text x="856" y="290" fill="#F9E0B5" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">durable files and policy</text>

  <rect x="1200" y="216" width="292" height="88" rx="22" fill="url(#cardD)"/>
  <text x="1228" y="264" fill="#FCF8FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800">4. Agents</text>
  <text x="1228" y="290" fill="#E0D4FF" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">scoped execution workers</text>

  <line x1="400" y1="420" x2="436" y2="420" stroke="#406AA4" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="772" y1="420" x2="808" y2="420" stroke="#406AA4" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1144" y1="420" x2="1180" y2="420" stroke="#406AA4" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="187" y="350" fill="#10284A" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">Owns the judgment</text>
  <text x="136" y="392" fill="#355070" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Reads the request and repo state</text>
  <text x="136" y="426" fill="#355070" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Chooses Direct Edit or an Agent run</text>
  <text x="136" y="460" fill="#355070" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Reviews evidence and accepts or retries</text>

  <text x="555" y="350" fill="#14363F" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">Owns the execution surface</text>
  <text x="484" y="392" fill="#3D5E68" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• MCP bridge plus localhost controller UI</text>
  <text x="484" y="426" fill="#3D5E68" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Issue, Task, Run, and Direct Edit workspace</text>
  <text x="484" y="460" fill="#3D5E68" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Allowed paths, checks, retry, integration</text>

  <text x="910" y="350" fill="#4A3212" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">Owns durable truth</text>
  <text x="856" y="392" fill="#6D532D" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• plans/, tasks/, .ai/context/, .ai/harness/</text>
  <text x="856" y="426" fill="#6D532D" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Contracts, reviews, checks, handoffs, traces</text>
  <text x="856" y="460" fill="#6D532D" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Recoverable state and policy boundaries</text>

  <text x="1280" y="350" fill="#341F56" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">Own execution attempts</text>
  <text x="1228" y="392" fill="#5B4580" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Codex, Claude, or GitHub Copilot workers</text>
  <text x="1228" y="426" fill="#5B4580" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Scoped worktree runs and compile/test/fix loops</text>
  <text x="1228" y="460" fill="#5B4580" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">• Return artifacts; never self-accept or merge</text>

  <g>
    <rect x="480" y="552" width="248" height="72" rx="18" fill="#EEF8F6" stroke="#BFE9E1"/>
    <text x="508" y="588" fill="#133A42" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">Default fast path</text>
    <text x="508" y="612" fill="#47666D" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">Direct Edit can write straight back into repo files.</text>

    <line x1="604" y1="552" x2="604" y2="498" stroke="#4A9F92" stroke-width="4" marker-end="url(#arrowSoft)"/>
    <line x1="604" y1="624" x2="912" y2="624" stroke="#4A9F92" stroke-width="4" marker-end="url(#arrowSoft)"/>
  </g>

  <path d="M1328 648C1260 690 1188 698 1120 698H724C665 698 620 718 580 748" stroke="#5E8DCB" stroke-width="5" stroke-dasharray="12 12" fill="none" marker-end="url(#arrowSoft)"/>

  <g filter="url(#shadow)">
    <rect x="88" y="726" width="1424" height="146" rx="28" fill="white" stroke="#CAD8EC"/>
  </g>

  <text x="120" y="774" fill="#10284A" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800">File-backed source of truth</text>
  <text x="120" y="810" fill="#496483" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600">plans • tasks • contracts • reviews • checks • handoffs • traces • policy</text>

  <g>
    <rect x="120" y="828" width="284" height="24" rx="12" fill="#EAF2FF"/>
    <rect x="432" y="828" width="272" height="24" rx="12" fill="#E8F8F5"/>
    <rect x="732" y="828" width="296" height="24" rx="12" fill="#FFF3DE"/>
    <rect x="1056" y="828" width="336" height="24" rx="12" fill="#F3ECFF"/>

    <text x="262" y="845" text-anchor="middle" fill="#345B8F" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800">source artifacts outlive any single chat</text>
    <text x="568" y="845" text-anchor="middle" fill="#2D786E" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800">controller orchestration stays reviewable</text>
    <text x="880" y="845" text-anchor="middle" fill="#8B6428" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800">direct edit and runs write evidence back to files</text>
    <text x="1224" y="845" text-anchor="middle" fill="#6B4B9F" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800">humans accept only after checks and explicit review</text>
  </g>
</svg>
